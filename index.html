<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Parasite.io</title><style>
body{margin:0;overflow:hidden;font-family:Arial;background:#1b5e20;color:white;}

#menu,#settings{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:linear-gradient(#1b5e20,#2e7d32);
}

#settings{display:none;}

h1{font-size:60px;text-shadow:0 0 20px black;}

.box{
background:rgba(0,0,0,0.4);
padding:30px;border-radius:20px;
box-shadow:0 0 30px black;
display:flex;flex-direction:column;align-items:center;
}

input,button,select{
padding:12px;margin:8px;border-radius:10px;border:none;
}

button{background:#00e676;cursor:pointer;}

#game{
display:none;
position:absolute;
width:4000px;height:4000px;
background:repeating-linear-gradient(45deg,#3fa34d,#3fa34d 20px,#45b35a 20px,#45b35a 40px);
}

.segment{position:absolute;border-radius:50%;}
.food{position:absolute;width:8px;height:8px;background:yellow;border-radius:50%;}

#joystickBase{
position:fixed;bottom:50px;left:50px;
width:240px;height:240px;
background:rgba(255,255,255,0.15);
border-radius:50%;display:none;
}

#joystickStick{
position:absolute;width:120px;height:120px;
background:white;border-radius:50%;
top:60px;left:60px;
}

#ui{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,0.5);
padding:10px;border-radius:10px;
}
</style></head><body><!-- MENU --><div id="menu">
<h1>Parasite.io</h1>
<div class="box">
<input id="nick" placeholder="Nick">
<input type="color" id="color" value="#00ff00">
<button onclick="start()">Jogar</button>
<button onclick="openSettings()">Settings</button>
</div>
</div><!-- SETTINGS --><div id="settings">
<h1>Settings</h1>
<div class="box"><label>Controle:</label>
<select id="controlType">

<option value="wasd">WASD</option>
<option value="arrows">Setinhas</option>
<option value="mouse">Mouse</option>
</select><label>Volume:</label>
<input type="range" id="volume" min="0" max="100" value="50">

<label>Joystick Size (mobile):</label>
<input type="range" id="joySize" min="150" max="400" value="240">

<button onclick="closeSettings()">Voltar</button>

</div>
</div><div id="game"></div><div id="joystickBase">
<div id="joystickStick"></div>
</div><div id="ui"></div><script>
let game=document.getElementById("game");
let ui=document.getElementById("ui");

let player={x:2000,y:2000,size:12,length:20,color:"#0f0"};
let segments=[];
let bots=[];
let foods=[];
let keys={};

let control="wasd";

/* SETTINGS */
function openSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("settings").style.display="flex";
}

function closeSettings(){
document.getElementById("settings").style.display="none";
document.getElementById("menu").style.display="flex";
}

/* CONTROLES */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* MOUSE */
let mouseX=0,mouseY=0;
document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});

/* JOYSTICK */
let joyX=0,joyY=0;
let base=document.getElementById("joystickBase");
let stick=document.getElementById("joystickStick");

base.addEventListener("touchmove",e=>{
let rect=base.getBoundingClientRect();
let t=e.touches[0];

let dx=t.clientX-(rect.left+base.offsetWidth/2);
let dy=t.clientY-(rect.top+base.offsetHeight/2);

let max=base.offsetWidth/2;
let dist=Math.hypot(dx,dy);

if(dist>max){
dx=dx/dist*max;
dy=dy/dist*max;
}

stick.style.left=(dx+max-60)+"px";
stick.style.top=(dy+max-60)+"px";

joyX=dx/max;
joyY=dy/max;
});

/* START */
function start(){
document.getElementById("menu").style.display="none";
game.style.display="block";

player.color=document.getElementById("color").value;
control=document.getElementById("controlType").value;

/* joystick size */
let size=document.getElementById("joySize").value;
base.style.width=size+"px";
base.style.height=size+"px";

if("ontouchstart" in window){
base.style.display="block";
}

/* spawn */
for(let i=0;i<10;i++)spawnBot();
for(let i=0;i<400;i++)foods.push({x:Math.random()*4000,y:Math.random()*4000});
}

/* BOT */
function spawnBot(){
bots.push({
x:Math.random()*4000,
y:Math.random()*4000,
size:12,
length:15,
segments:[]
});
}

/* LOOP */
function loop(){

let speed=3;
let dx=0,dy=0;

/* CONTROLE */
if(control==="wasd"){
if(keys["w"])dy--;
if(keys["s"])dy++;
if(keys["a"])dx--;
if(keys["d"])dx++;
}
if(control==="arrows"){
if(keys["ArrowUp"])dy--;
if(keys["ArrowDown"])dy++;
if(keys["ArrowLeft"])dx--;
if(keys["ArrowRight"])dx++;
}
if(control==="mouse"){
dx=(mouseX-window.innerWidth/2)/100;
dy=(mouseY-window.innerHeight/2)/100;
}

dx+=joyX;dy+=joyY;

let dist=Math.hypot(dx,dy);
if(dist>0){dx/=dist;dy/=dist;}

player.x+=dx*speed;
player.y+=dy*speed;

/* BORDA */
if(player.x<0||player.y<0||player.x>4000||player.y>4000)die();

/* COMER COMIDA */
foods.forEach((f,i)=>{
if(Math.hypot(f.x-player.x,f.y-player.y)<player.size){
foods.splice(i,1);
player.length+=2;
}
});

/* PLAYER CORPO */
segments.unshift({x:player.x,y:player.y});
segments.splice(player.length);

/* BOTS */
bots.forEach((b,i)=>{

/* comida alvo */
let target=foods[Math.floor(Math.random()*foods.length)];
if(target){
let dx=target.x-b.x;
let dy=target.y-b.y;
let d=Math.hypot(dx,dy);
b.x+=dx/d*2;
b.y+=dy/d*2;
}

/* comer comida */
foods.forEach((f,fi)=>{
if(Math.hypot(f.x-b.x,f.y-b.y)<b.size){
foods.splice(fi,1);
b.length+=2;
}
});

/* corpo */
b.segments.unshift({x:b.x,y:b.y});
b.segments.splice(b.length);

/* colisão com player */
let d=Math.hypot(player.x-b.x,player.y-b.y);

if(d<player.size && player.length>b.length){
bots.splice(i,1);
player.length+=5;
spawnBot();spawnBot();
}

if(d<b.size && b.length>player.length){
die();
}

/* borda */
if(b.x<0||b.y<0||b.x>4000||b.y>4000){
bots.splice(i,1);
spawnBot();spawnBot();
}
});

/* DESENHAR */
game.innerHTML="";

/* comida */
foods.forEach(f=>{
let d=document.createElement("div");
d.className="food";
d.style.left=f.x+"px";
d.style.top=f.y+"px";
game.appendChild(d);
});

/* player */
segments.forEach(s=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=s.x+"px";
d.style.top=s.y+"px";
d.style.width=player.size+"px";
d.style.height=player.size+"px";
d.style.background=player.color;
game.appendChild(d);
});

/* bots */
bots.forEach(b=>{
b.segments.forEach(s=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=s.x+"px";
d.style.top=s.y+"px";
d.style.width=b.size+"px";
d.style.height=b.size+"px";
d.style.background="red";
game.appendChild(d);
});
});

/* CAMERA */
game.style.transform=`
translate(${window.innerWidth/2}px,${window.innerHeight/2}px)
translate(${-player.x}px,${-player.y}px)
`;

ui.innerText="Tamanho: "+player.length;

requestAnimationFrame(loop);
}

function die(){
alert("Você morreu!");
location.reload();
}

loop();
</script></body>
</html>
