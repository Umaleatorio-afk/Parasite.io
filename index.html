<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Parasite.io PRO</title><style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#2e7d32;
}

/* MENU */
#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

.title{
font-size:50px;
text-shadow:0 0 20px black;
}

.box{
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:20px;
}

input,button{
margin:5px;
padding:10px;
border:none;
border-radius:10px;
}

button{
background:#00e676;
}

/* GAME */
#game{
display:none;
position:absolute;
width:4000px;
height:4000px;
background:url("https://i.imgur.com/8QZ7Z6R.png");
background-size:200px;
}

.parasite{
position:absolute;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

.eye{
width:8px;
height:8px;
background:white;
border-radius:50%;
margin:2px;
}

.food{
position:absolute;
width:10px;
height:10px;
background:yellow;
border-radius:50%;
}

/* UI */
#ui{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}
</style></head><body><div id="menu">
<div class="title">Parasite.io</div>
<div class="box">
<input id="nick" placeholder="Nickname">
<input type="color" id="color" value="#00ff00">
<button onclick="start()">Jogar Online</button>
</div>
</div><div id="game"></div>
<div id="ui"></div><script>
let ws;
let player={x:2000,y:2000,size:30};
let others={};
let foods=[];

function start(){

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

ws = new WebSocket("COLE_AQUI_SEU_LINK");

ws.onmessage = (msg)=>{
let data = JSON.parse(msg.data);

if(data.type==="players"){
others = data.players;
}
};

spawnFood();
loop();
}

/* CONTROLES */
let tx=0,ty=0;

document.addEventListener("mousemove",e=>{
tx=e.clientX;
ty=e.clientY;
});

document.addEventListener("touchmove",e=>{
tx=e.touches[0].clientX;
ty=e.touches[0].clientY;
});

/* COMIDA */
function spawnFood(){
for(let i=0;i<200;i++){
foods.push({
x:Math.random()*4000,
y:Math.random()*4000
});
}
}

/* LOOP */
function loop(){

let dx=(tx-window.innerWidth/2)/50;
let dy=(ty-window.innerHeight/2)/50;

player.x+=dx;
player.y+=dy;

/* MORTE BORDA */
if(player.x<0||player.y<0||player.x>4000||player.y>4000){
alert("Você morreu!");
location.reload();
}

/* COMER */
foods.forEach((f,i)=>{
let d=Math.hypot(f.x-player.x,f.y-player.y);
if(d<player.size){
foods.splice(i,1);
player.size+=1;
}
});

/* ENVIAR SERVER */
ws.send(JSON.stringify({
type:"update",
x:player.x,
y:player.y,
size:player.size,
color:document.getElementById("color").value,
nick:document.getElementById("nick").value
}));

let game=document.getElementById("game");
game.innerHTML="";

/* DESENHAR COMIDA */
foods.forEach(f=>{
let d=document.createElement("div");
d.className="food";
d.style.left=f.x+"px";
d.style.top=f.y+"px";
game.appendChild(d);
});

/* DESENHAR PLAYERS */
for(let id in others){
let p=others[id];

let d=document.createElement("div");
d.className="parasite";
d.style.left=p.x+"px";
d.style.top=p.y+"px";
d.style.width=p.size+"px";
d.style.height=p.size+"px";
d.style.background=p.color;

/* OLHOS */
for(let i=0;i<2;i++){
let eye=document.createElement("div");
eye.className="eye";
d.appendChild(eye);
}

game.appendChild(d);

/* COLISÃO */
let dist=Math.hypot(p.x-player.x,p.y-player.y);
if(dist<player.size && p.size>player.size){
alert("Você foi comido!");
location.reload();
}
}

/* CAMERA */
game.style.transform=`translate(${-player.x+window.innerWidth/2}px,${-player.y+window.innerHeight/2}px)`;

/* UI */
document.getElementById("ui").innerText="Tamanho: "+player.size;

requestAnimationFrame(loop);
}
</script></body>
</html>
