<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Parasite.io OFFLINE PRO</title><style>
body{
margin:0;
overflow:hidden;
background:#3fa34d;
}

/* GAME */
#game{
position:absolute;
width:4000px;
height:4000px;
background:
repeating-linear-gradient(
45deg,
#3fa34d,
#3fa34d 20px,
#45b35a 20px,
#45b35a 40px
);
}

.parasite{
position:absolute;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

.eye{
width:6px;
height:6px;
background:white;
border-radius:50%;
margin:2px;
}

.food{
position:absolute;
width:8px;
height:8px;
background:yellow;
border-radius:50%;
}

</style></head><body><div id="game"></div><script>
let game=document.getElementById("game");

let player={x:2000,y:2000,size:30};
let bots=[];
let foods=[];

let tx=2000,ty=2000;

/* CONTROLES */
document.addEventListener("mousemove",e=>{
tx=player.x+(e.clientX-window.innerWidth/2);
ty=player.y+(e.clientY-window.innerHeight/2);
});

document.addEventListener("touchmove",e=>{
tx=player.x+(e.touches[0].clientX-window.innerWidth/2);
ty=player.y+(e.touches[0].clientY-window.innerHeight/2);
});

/* CRIAR BOTS */
for(let i=0;i<15;i++){
bots.push({
x:Math.random()*4000,
y:Math.random()*4000,
size:20+Math.random()*20
});
}

/* COMIDA */
function spawnFood(){
for(let i=0;i<200;i++){
foods.push({
x:Math.random()*4000,
y:Math.random()*4000
});
}
}
spawnFood();

/* LOOP */
function loop(){

let dx=(tx-player.x)/50;
let dy=(ty-player.y)/50;

player.x+=dx;
player.y+=dy;

/* COMER */
foods.forEach((f,i)=>{
let d=Math.hypot(f.x-player.x,f.y-player.y);
if(d<player.size){
foods.splice(i,1);
player.size+=1;
}
});

/* BOTS */
bots.forEach(b=>{
let dx=player.x-b.x;
let dy=player.y-b.y;
let dist=Math.hypot(dx,dy);

/* IA simples */
if(b.size < player.size){
b.x -= dx/dist*1.5;
b.y -= dy/dist*1.5;
}else{
b.x += dx/dist*1.5;
b.y += dy/dist*1.5;
}

/* morrer */
if(dist < player.size && b.size > player.size){
alert("Você morreu!");
location.reload();
}
});

/* DESENHAR */
game.innerHTML="";

/* COMIDA */
foods.forEach(f=>{
let d=document.createElement("div");
d.className="food";
d.style.left=f.x+"px";
d.style.top=f.y+"px";
game.appendChild(d);
});

/* PLAYER */
let p=document.createElement("div");
p.className="parasite";
p.style.left=player.x+"px";
p.style.top=player.y+"px";
p.style.width=player.size+"px";
p.style.height=player.size+"px";
p.style.background="lime";

for(let i=0;i<2;i++){
let e=document.createElement("div");
e.className="eye";
p.appendChild(e);
}

game.appendChild(p);

/* BOTS */
bots.forEach(b=>{
let d=document.createElement("div");
d.className="parasite";
d.style.left=b.x+"px";
d.style.top=b.y+"px";
d.style.width=b.size+"px";
d.style.height=b.size+"px";
d.style.background="red";
game.appendChild(d);
});

/* CAMERA + ZOOM */
let zoom = 1 + (player.size/200);

game.style.transform = `
translate(${-player.x+window.innerWidth/2}px,${-player.y+window.innerHeight/2}px)
scale(${1/zoom})
`;

requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
