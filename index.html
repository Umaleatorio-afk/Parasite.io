<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Parasite.io</title><style>
body{margin:0;overflow:hidden;font-family:Arial;background:#1b5e20;}

#menu{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:linear-gradient(#1b5e20,#2e7d32);color:white;
}

#menu h1{font-size:60px;text-shadow:0 0 20px black;}

.menuBox{
background:rgba(0,0,0,0.4);
padding:30px;border-radius:20px;
box-shadow:0 0 30px black;
display:flex;flex-direction:column;align-items:center;
}

input,button{padding:12px;margin:8px;border-radius:10px;border:none;}
button{background:#00e676;cursor:pointer;}

#game{
display:none;
position:absolute;
width:4000px;height:4000px;
background:repeating-linear-gradient(45deg,#3fa34d,#3fa34d 20px,#45b35a 20px,#45b35a 40px);
}

.segment{position:absolute;border-radius:50%;}
.food{position:absolute;width:8px;height:8px;background:yellow;border-radius:50%;}

/* JOYSTICK */
#joystickBase{
position:fixed;bottom:50px;left:50px;
width:240px;height:240px;
background:rgba(255,255,255,0.15);
border-radius:50%;display:none;
}

#joystickStick{
position:absolute;width:120px;height:120px;
background:white;border-radius:50%;
top:60px;left:60px;
}

#ui{
position:fixed;top:10px;left:10px;
color:white;background:rgba(0,0,0,0.5);
padding:10px;border-radius:10px;
}
</style></head><body><div id="menu">
<h1>Parasite.io</h1>
<div class="menuBox">
<input id="nick" placeholder="Nick">
<input type="color" id="color" value="#00ff00">
<button onclick="start()">Jogar</button>
</div>
</div><div id="game"></div><div id="joystickBase">
<div id="joystickStick"></div>
</div><div id="ui"></div><script>
let game=document.getElementById("game");
let ui=document.getElementById("ui");

let player={x:2000,y:2000,size:12,color:"#00ff00",length:20};
let segments=[];
let bots=[];
let foods=[];
let keys={};

/* CONTROLES */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* JOYSTICK */
let joyX=0,joyY=0;
let base=document.getElementById("joystickBase");
let stick=document.getElementById("joystickStick");
let touching=false;

base.addEventListener("touchstart",()=>touching=true);

base.addEventListener("touchmove",e=>{
if(!touching)return;

let rect=base.getBoundingClientRect();
let t=e.touches[0];

let dx=t.clientX-(rect.left+120);
let dy=t.clientY-(rect.top+120);

let dist=Math.hypot(dx,dy);
let max=90;

if(dist>max){
dx=dx/dist*max;
dy=dy/dist*max;
}

stick.style.left=(dx+60)+"px";
stick.style.top=(dy+60)+"px";

joyX=dx/max;
joyY=dy/max;
});

base.addEventListener("touchend",()=>{
touching=false;
joyX=0;joyY=0;
stick.style.left="60px";
stick.style.top="60px";
});

/* START */
function start(){
document.getElementById("menu").style.display="none";
game.style.display="block";

player.color=document.getElementById("color").value;

if("ontouchstart" in window){
base.style.display="block";
}

spawnBots(10);

for(let i=0;i<400;i++){
foods.push({x:Math.random()*4000,y:Math.random()*4000});
}
}

/* SPAWN BOTS */
function spawnBots(q){
for(let i=0;i<q;i++){
bots.push({
x:Math.random()*4000,
y:Math.random()*4000,
size:12,
length:15,
segments:[]
});
}
}

/* LOOP */
function loop(){

let speed=3;
let dx=0,dy=0;

/* CONTROLES */
if(keys["w"]||keys["ArrowUp"]) dy--;
if(keys["s"]||keys["ArrowDown"]) dy++;
if(keys["a"]||keys["ArrowLeft"]) dx--;
if(keys["d"]||keys["ArrowRight"]) dx++;

dx+=joyX;
dy+=joyY;

let dist=Math.hypot(dx,dy);
if(dist>0){dx/=dist;dy/=dist;}

player.x+=dx*speed;
player.y+=dy*speed;

/* MORTE BORDA */
if(player.x<0||player.y<0||player.x>4000||player.y>4000){
die();
}

/* COMIDA PLAYER */
foods.forEach((f,i)=>{
if(Math.hypot(f.x-player.x,f.y-player.y)<player.size){
foods.splice(i,1);
player.length+=2;
}
});

/* BOTS */
bots.forEach((b,i)=>{

/* IA comida */
let target=foods[Math.floor(Math.random()*foods.length)];
if(target){
let dx=target.x-b.x;
let dy=target.y-b.y;
let d=Math.hypot(dx,dy);
b.x+=dx/d*1.5;
b.y+=dy/d*1.5;
}

/* comer comida */
foods.forEach((f,fi)=>{
if(Math.hypot(f.x-b.x,f.y-b.y)<b.size){
foods.splice(fi,1);
b.length+=2;
}
});

/* morte borda */
if(b.x<0||b.y<0||b.x>4000||b.y>4000){
bots.splice(i,1);
spawnBots(2);
}

/* matar player */
let d=Math.hypot(player.x-b.x,player.y-b.y);
if(d<b.size && b.size>player.size){
die();
}

/* player mata bot */
if(d<player.size && player.size>b.size){
bots.splice(i,1);
player.length+=5;
spawnBots(2);
}

/* crescer corpo */
b.segments.unshift({x:b.x,y:b.y});
b.segments.splice(b.length);
});

/* PLAYER CORPO */
segments.unshift({x:player.x,y:player.y});
segments.splice(player.length);

/* DESENHAR */
game.innerHTML="";

/* comida */
foods.forEach(f=>{
let d=document.createElement("div");
d.className="food";
d.style.left=f.x+"px";
d.style.top=f.y+"px";
game.appendChild(d);
});

/* player */
segments.forEach(s=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=s.x+"px";
d.style.top=s.y+"px";
d.style.width=player.size+"px";
d.style.height=player.size+"px";
d.style.background=player.color;
game.appendChild(d);
});

/* bots */
bots.forEach(b=>{
b.segments.forEach(s=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=s.x+"px";
d.style.top=s.y+"px";
d.style.width=b.size+"px";
d.style.height=b.size+"px";
d.style.background="red";
game.appendChild(d);
});
});

/* CAMERA */
game.style.transform=`
translate(${window.innerWidth/2}px,${window.innerHeight/2}px)
translate(${-player.x}px,${-player.y}px)
`;

/* UI */
ui.innerText="Tamanho: "+player.length+" | Bots: "+bots.length;

requestAnimationFrame(loop);
}

function die(){
alert("Você morreu!");
location.reload();
}

loop();
</script></body>
  </html>
