<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Parasite.io PRO MAX</title><style>
body{margin:0;overflow:hidden;background:#2e7d32;font-family:Arial;}

#menu{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
color:white;
}

button,input{padding:10px;margin:5px;border:none;border-radius:10px;}

#game{
display:none;
position:absolute;
width:4000px;height:4000px;
background:repeating-linear-gradient(45deg,#3fa34d,#3fa34d 20px,#45b35a 20px,#45b35a 40px);
}

.segment{
position:absolute;
border-radius:50%;
}

.food{
position:absolute;
width:8px;height:8px;background:yellow;border-radius:50%;
}

/* JOYSTICK PRO */
#joystickBase{
position:fixed;
bottom:30px;left:30px;
width:120px;height:120px;
background:rgba(255,255,255,0.2);
border-radius:50%;
display:none;
}

#joystickStick{
position:absolute;
width:60px;height:60px;
background:rgba(255,255,255,0.5);
border-radius:50%;
top:30px;left:30px;
}

#ui{
position:fixed;top:10px;left:10px;
color:white;background:rgba(0,0,0,0.5);
padding:10px;border-radius:10px;
}
</style></head><body><div id="menu">
<h1>Parasite.io</h1>
<input id="nick" placeholder="Nick">
<input type="color" id="color" value="#00ff00">
<button onclick="start()">Jogar</button>
</div><div id="game"></div><div id="joystickBase">
<div id="joystickStick"></div>
</div><div id="ui"></div><script>
let game=document.getElementById("game");
let ui=document.getElementById("ui");

let player={x:2000,y:2000,size:15,color:"#00ff00"};
let segments=[];
let bots=[];
let foods=[];
let keys={};

/* CONTROLES PC */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* JOYSTICK PRO */
let joyX=0, joyY=0;
let base=document.getElementById("joystickBase");
let stick=document.getElementById("joystickStick");

let touching=false;

base.addEventListener("touchstart",e=>{
touching=true;
});

base.addEventListener("touchmove",e=>{
if(!touching)return;

let rect=base.getBoundingClientRect();
let t=e.touches[0];

let dx=t.clientX-(rect.left+60);
let dy=t.clientY-(rect.top+60);

let dist=Math.hypot(dx,dy);
let max=40;

if(dist>max){
dx=dx/dist*max;
dy=dy/dist*max;
}

stick.style.left=(dx+60-30)+"px";
stick.style.top=(dy+60-30)+"px";

joyX=dx/max;
joyY=dy/max;
});

base.addEventListener("touchend",()=>{
touching=false;
joyX=0;joyY=0;
stick.style.left="30px";
stick.style.top="30px";
});

/* START */
function start(){
document.getElementById("menu").style.display="none";
game.style.display="block";

player.color=document.getElementById("color").value;

if("ontouchstart" in window){
base.style.display="block";
}

/* bots */
for(let i=0;i<15;i++){
bots.push({
x:Math.random()*4000,
y:Math.random()*4000,
size:10+Math.random()*30
});
}

/* comida */
for(let i=0;i<300;i++){
foods.push({x:Math.random()*4000,y:Math.random()*4000});
}
}

/* LOOP */
function loop(){

let speed=3;
let dx=0,dy=0;

/* teclado */
if(keys["w"]||keys["ArrowUp"]) dy--;
if(keys["s"]||keys["ArrowDown"]) dy++;
if(keys["a"]||keys["ArrowLeft"]) dx--;
if(keys["d"]||keys["ArrowRight"]) dx++;

/* mobile */
dx+=joyX;
dy+=joyY;

player.x+=dx*speed;
player.y+=dy*speed;

/* morrer borda */
if(player.x<0||player.y<0||player.x>4000||player.y>4000){
die();
}

/* comer comida */
foods.forEach((f,i)=>{
if(Math.hypot(f.x-player.x,f.y-player.y)<player.size){
foods.splice(i,1);
player.size+=0.5;
segments.push({x:player.x,y:player.y});
}
});

/* comer bots */
bots.forEach((b,i)=>{
let dist=Math.hypot(b.x-player.x,b.y-player.y);

if(dist<player.size && player.size>b.size){
player.size+=b.size/2;
bots.splice(i,1);
}

/* morrer pra bot */
if(dist<b.size && b.size>player.size){
die();
}
});

/* segmentos */
segments.unshift({x:player.x,y:player.y});
segments.splice(player.size);

/* desenhar */
game.innerHTML="";

/* comida */
foods.forEach(f=>{
let d=document.createElement("div");
d.className="food";
d.style.left=f.x+"px";
d.style.top=f.y+"px";
game.appendChild(d);
});

/* corpo */
segments.forEach(s=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=s.x+"px";
d.style.top=s.y+"px";
d.style.width=player.size+"px";
d.style.height=player.size+"px";
d.style.background=player.color;
game.appendChild(d);
});

/* bots */
bots.forEach(b=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=b.x+"px";
d.style.top=b.y+"px";
d.style.width=b.size+"px";
d.style.height=b.size+"px";
d.style.background="red";
game.appendChild(d);
});

/* CAMERA (CORRIGIDA) */
let zoom = 1.5 - (player.size/100);
if(zoom<0.6) zoom=0.6;

game.style.transform=
`translate(${-player.x*zoom+window.innerWidth/2}px,${-player.y*zoom+window.innerHeight/2}px) scale(${zoom})`;

/* ranking */
let ranking=[...bots,{size:player.size}].sort((a,b)=>b.size-a.size);
ui.innerText="Top: "+Math.floor(ranking[0].size)+" | Você: "+Math.floor(player.size);

requestAnimationFrame(loop);
}

function die(){
alert("Você morreu!");
location.reload();
}

loop();
</script></body>
</html>
