<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Parasite.io</title><style>
body{margin:0;overflow:hidden;font-family:Arial;background:#1b5e20;}

/* MENU BONITO */
#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(#1b5e20,#2e7d32);
color:white;
}

#menu h1{
font-size:60px;
margin-bottom:20px;
text-shadow:0 0 20px black;
}

.menuBox{
background:rgba(0,0,0,0.4);
padding:30px;
border-radius:20px;
box-shadow:0 0 30px black;
display:flex;
flex-direction:column;
align-items:center;
}

input{
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px 20px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00e676;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:#00c853;
}

/* GAME */
#game{
display:none;
position:absolute;
width:4000px;height:4000px;
background:repeating-linear-gradient(45deg,#3fa34d,#3fa34d 20px,#45b35a 20px,#45b35a 40px);
}

.segment{
position:absolute;
border-radius:50%;
}

.food{
position:absolute;
width:8px;height:8px;
background:yellow;
border-radius:50%;
}

/* JOYSTICK GIGANTE */
#joystickBase{
position:fixed;
bottom:50px;
left:50px;
width:240px;
height:240px;
background:rgba(255,255,255,0.15);
border-radius:50%;
display:none;
backdrop-filter:blur(5px);
}

#joystickStick{
position:absolute;
width:120px;
height:120px;
background:rgba(255,255,255,0.7);
border-radius:50%;
top:60px;
left:60px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* UI */
#ui{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}
</style></head><body><div id="menu">
<h1>Parasite.io</h1><div class="menuBox">
<input id="nick" placeholder="Seu nick">
<input type="color" id="color" value="#00ff00">
<button onclick="start()">Jogar</button>
</div>
</div><div id="game"></div><div id="joystickBase">
<div id="joystickStick"></div>
</div><div id="ui"></div><script>
let game=document.getElementById("game");
let ui=document.getElementById("ui");

let player={x:2000,y:2000,size:15,color:"#00ff00"};
let segments=[];
let bots=[];
let foods=[];
let keys={};

/* CONTROLES PC */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* JOYSTICK */
let joyX=0, joyY=0;
let base=document.getElementById("joystickBase");
let stick=document.getElementById("joystickStick");
let touching=false;

base.addEventListener("touchstart",()=>touching=true);

base.addEventListener("touchmove",e=>{
if(!touching)return;

let rect=base.getBoundingClientRect();
let t=e.touches[0];

let dx=t.clientX-(rect.left+120);
let dy=t.clientY-(rect.top+120);

let dist=Math.hypot(dx,dy);
let max=90;

if(dist>max){
dx=dx/dist*max;
dy=dy/dist*max;
}

stick.style.left=(dx+120-60)+"px";
stick.style.top=(dy+120-60)+"px";

joyX=dx/max;
joyY=dy/max;
});

base.addEventListener("touchend",()=>{
touching=false;
joyX=0;joyY=0;
stick.style.left="60px";
stick.style.top="60px";
});

/* START */
function start(){
document.getElementById("menu").style.display="none";
game.style.display="block";

player.color=document.getElementById("color").value;

if("ontouchstart" in window){
base.style.display="block";
}

/* bots */
for(let i=0;i<15;i++){
bots.push({
x:Math.random()*4000,
y:Math.random()*4000,
size:10+Math.random()*30
});
}

/* comida */
for(let i=0;i<300;i++){
foods.push({x:Math.random()*4000,y:Math.random()*4000});
}
}

/* LOOP */
function loop(){

let speed=3;
let dx=0,dy=0;

/* teclado */
if(keys["w"]||keys["ArrowUp"]) dy--;
if(keys["s"]||keys["ArrowDown"]) dy++;
if(keys["a"]||keys["ArrowLeft"]) dx--;
if(keys["d"]||keys["ArrowRight"]) dx++;

/* mobile */
dx+=joyX;
dy+=joyY;

/* NORMALIZAR */
let dist=Math.hypot(dx,dy);
if(dist>0){
dx/=dist;
dy/=dist;
}

player.x+=dx*speed;
player.y+=dy*speed;

/* MORTE BORDA */
if(player.x<0||player.y<0||player.x>4000||player.y>4000){
die();
}

/* COMIDA */
foods.forEach((f,i)=>{
if(Math.hypot(f.x-player.x,f.y-player.y)<player.size){
foods.splice(i,1);
player.size+=0.5;
}
});

/* BOTS */
bots.forEach((b,i)=>{
let dx=player.x-b.x;
let dy=player.y-b.y;
let d=Math.hypot(dx,dy);

if(b.size<player.size){
b.x-=dx/d*1.5;
b.y-=dy/d*1.5;
}else{
b.x+=dx/d*1.5;
b.y+=dy/d*1.5;
}

if(d<player.size && player.size>b.size){
player.size+=b.size/2;
bots.splice(i,1);
}

if(d<b.size && b.size>player.size){
die();
}
});

/* SEGMENTOS */
segments.unshift({x:player.x,y:player.y});
segments.splice(50);

/* DESENHAR */
game.innerHTML="";

/* comida */
foods.forEach(f=>{
let d=document.createElement("div");
d.className="food";
d.style.left=f.x+"px";
d.style.top=f.y+"px";
game.appendChild(d);
});

/* player */
segments.forEach(s=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=s.x+"px";
d.style.top=s.y+"px";
d.style.width=player.size+"px";
d.style.height=player.size+"px";
d.style.background=player.color;
game.appendChild(d);
});

/* bots */
bots.forEach(b=>{
let d=document.createElement("div");
d.className="segment";
d.style.left=b.x+"px";
d.style.top=b.y+"px";
d.style.width=b.size+"px";
d.style.height=b.size+"px";
d.style.background="red";
game.appendChild(d);
});

/* CAMERA COLADA */
game.style.transform=`
translate(${window.innerWidth/2}px,${window.innerHeight/2}px)
scale(1)
translate(${-player.x}px,${-player.y}px)
`;

/* UI */
let ranking=[...bots,{size:player.size}].sort((a,b)=>b.size-a.size);
ui.innerText="Top: "+Math.floor(ranking[0].size)+" | Você: "+Math.floor(player.size);

requestAnimationFrame(loop);
}

function die(){
alert("Você morreu!");
location.reload();
}

loop();
</script></body>
</html>
